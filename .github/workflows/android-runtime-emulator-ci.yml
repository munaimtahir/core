name: Android Runtime Emulator CI

on:
  pull_request:
  push:
    branches:
      - "**"

concurrency:
  group: android-runtime-emulator-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew clean assembleDebug

      - name: Emulator Runtime Smoke
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          disable-animations: true
          script: |
            set -euxo pipefail
            APK="app/build/outputs/apk/debug/app-debug.apk"
            test -f "$APK"
            adb wait-for-device
            adb install -r "$APK"
            adb shell am start -n com.easyui.core/.MainActivity
            sleep 8
            adb exec-out screencap -p > runtime_screenshot.png
            adb logcat -d > runtime_logcat.txt
            # Basic crash signal check (best-effort, not a guarantee).
            ! grep -n "FATAL EXCEPTION" runtime_logcat.txt

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-artifacts
          path: |
            runtime_screenshot.png
            runtime_logcat.txt
            app/build/outputs/apk/debug/app-debug.apk

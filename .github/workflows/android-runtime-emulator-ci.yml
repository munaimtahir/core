name: Android Runtime Emulator CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  push:
    branches:
      - "**"
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: android-runtime-emulator-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew clean assembleDebug

      - name: Emulator Runtime Smoke
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-boot-timeout: 1200
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-snapshot
          script: |
            bash -lc 'set -euxo pipefail; adb kill-server || true; adb start-server; APK="app/build/outputs/apk/debug/app-debug.apk"; test -f "$APK"; adb wait-for-device; adb logcat -c || true; adb install -r "$APK"; adb shell am start -n com.easyui.core/.MainActivity; sleep 8; adb exec-out screencap -p > runtime_screenshot.png; adb logcat -d > runtime_logcat.txt; if grep -n "FATAL EXCEPTION" runtime_logcat.txt; then if grep -n -A 30 "FATAL EXCEPTION" runtime_logcat.txt | grep -q "Process: com.easyui.core"; then echo "Detected Core launcher crash in logcat"; exit 1; else echo "FATAL EXCEPTION found, but not attributed to com.easyui.core"; fi; fi'

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-artifacts
          path: |
            runtime_screenshot.png
            runtime_logcat.txt
            app/build/outputs/apk/debug/app-debug.apk
